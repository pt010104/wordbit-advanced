services:
  postgres:
    image: postgres:16-alpine
    container_name: wordbit-backend-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wordbit}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wordbit}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wordbit-backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      PORT: ${PORT:-8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-wordbit}?sslmode=disable
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Ho_Chi_Minh}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
      DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}
      DEV_AUTH_SUBJECT: ${DEV_AUTH_SUBJECT:-dev-user}
      DEV_AUTH_EMAIL: ${DEV_AUTH_EMAIL:-dev@example.com}
      AUTH_JWKS_URL: ${AUTH_JWKS_URL:-}
      AUTH_ISSUER: ${AUTH_ISSUER:-}
      AUTH_AUDIENCE: ${AUTH_AUDIENCE:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_MODEL_2: ${GEMINI_MODEL_2:-}
      GEMINI_MODEL_3: ${GEMINI_MODEL_3:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_KEY_FILE: ${GEMINI_API_KEY_FILE:-}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT:-20s}
      GEMINI_MAX_RETRIES: ${GEMINI_MAX_RETRIES:-3}
      GEMINI_TEMPERATURE: ${GEMINI_TEMPERATURE:-0.4}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-4096}
      GEMINI_RPM_LIMIT: ${GEMINI_RPM_LIMIT:-5}
      GEMINI_RPD_LIMIT: ${GEMINI_RPD_LIMIT:-20}
      CRON_ENABLED: ${CRON_ENABLED:-true}
      CRON_PREWARM_SCHEDULE: ${CRON_PREWARM_SCHEDULE:-10 0 * * *}
      CRON_WEAKNESS_SCHEDULE: ${CRON_WEAKNESS_SCHEDULE:-0 * * * *}
      ACTIVE_USER_LOOKBACK: ${ACTIVE_USER_LOOKBACK:-168h}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-10s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
      HTTP_IDLE_TIMEOUT: ${HTTP_IDLE_TIMEOUT:-60s}
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
